name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

#In case 2 pushes happend in the same time the latest push will be the one deployed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #Test dosen't need to wait for build to finish so they run at the same time (as tests already install dependencies)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  security-scan:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      #CI will fail if Ciritical or High severity vulnerabilities were found
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 1
          ignore-unfixed: false
          severity: CRITICAL,HIGH

      #scanning for Medium and low vulnerabilities on LOG
      - name: Trivy vulnerability report (medium/low)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 0
          severity: MEDIUM,LOW

  deploy:
    name: Deploy
    needs: [build, test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    # Concurrency handling: if a push arrives mid-deploy, the server could be left with no running container -
    # after "docker stop" but before "docker run". Queue the new deploy instead of cancelling.
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
    #lower casing the repo name as my username includes high case letters/
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker stop sentiment-api || true
            docker rm sentiment-api || true
            docker run -d \
              --name sentiment-api \
              --restart unless-stopped \
              -p 8080:8080 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      #running test to verify application is running
      - name: Smoke test
        run: |
          sleep 15
          curl --fail http://${{ secrets.EC2_HOST }}:8080/ready
          curl --fail -X POST http://${{ secrets.EC2_HOST }}:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"text": "smoke test"}'

      #log in GHCR to update :latest to point on the lastest push.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote to latest
        run: docker buildx imagetools create -t ghcr.io/${{ env.IMAGE_NAME }}:latest ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}